name: Build
run-name: 'Build: ${{github.ref_name}}_${{github.run_id}}_${{github.run_attempt}}'

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch_name:
        description: Branch to build
        required: true
        default: main

jobs:
  test:
    name: Run UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [Chrome, Edge, Firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch_name || github.ref }}

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Run Tests
        run: |
          set -o pipefail
          dotnet test CSharpSelFramework.csproj --logger "console;verbosity=normal" -- NUnit.NumberOfTestWorkers=1 TestRunParameters.Parameter\(name=\"headless\",value=\"true\"\) TestRunParameters.Parameter\(name=\"browser\",value=\"${{ matrix.browser }}\"\) 2>&1 | tee test-output.txt

      - name: Parse test results
        if: always()
        run: |
          PASSED=$(grep -oP 'Passed:\s+\K\d+' test-output.txt | tail -1)
          FAILED=$(grep -oP 'Failed:\s+\K\d+' test-output.txt | tail -1)
          echo "passed=${PASSED:-0}" > test-summary.txt
          echo "failed=${FAILED:-0}" >> test-summary.txt
          echo "browser=${{ matrix.browser }}" >> test-summary.txt

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tests-report-${{ matrix.browser }}
          path: |
            index.html
            test-summary.txt
          retention-days: 3

  summary:
    name: Test Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build summary table
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Passed | Failed | Report |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|:------:|:------:|--------|" >> $GITHUB_STEP_SUMMARY

          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)

          for browser in Chrome Edge Firefox; do
            FILE="artifacts/tests-report-${browser}/test-summary.txt"
            if [ -f "$FILE" ]; then
              PASSED=$(grep 'passed=' "$FILE" | cut -d= -f2)
              FAILED=$(grep 'failed=' "$FILE" | cut -d= -f2)
            else
              PASSED="N/A"
              FAILED="N/A"
            fi

            ARTIFACT_ID=$(echo "$ARTIFACTS" | jq -r ".artifacts[] | select(.name==\"tests-report-${browser}\") | .id")
            if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
              LINK="[Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID})"
            else
              LINK="N/A"
            fi

            echo "| $browser | $PASSED | $FAILED | $LINK |" >> $GITHUB_STEP_SUMMARY
          done
