name: Build
run-name: 'Build: ${{github.ref_name}}_${{github.run_id}}_${{github.run_attempt}}'

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch_name:
        description: Branch to build
        required: true
        default: main

jobs:
  test:
    name: Run UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [Chrome, Edge, Firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch_name || github.ref }}

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Run Tests
        continue-on-error: true
        run: |
          dotnet test CSharpSelFramework.csproj -- NUnit.NumberOfTestWorkers=1 TestRunParameters.Parameter\(name=\"headless\",value=\"true\"\) TestRunParameters.Parameter\(name=\"browser\",value=\"${{ matrix.browser }}\"\)

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: tests-report-${{ matrix.browser }}
          path: index.html
          retention-days: 3

      - name: Display build info
        run: |
          echo "Build completed (${{ matrix.browser }})!" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run ID:** ${{github.run_id}}" >> "$GITHUB_STEP_SUMMARY"
